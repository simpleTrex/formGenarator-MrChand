<div class="login-wrapper fade-in">
  <app-modern-card theme="light">
    <div class="login-header">
      <h2>Domain User Login</h2>
      <p>Access your organization's workspace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <app-modern-input
        label="Domain Slug"
        type="text"
        formControlName="domainSlug"
        placeholder="e.g. acme-corp"
        [required]="true"
      ></app-modern-input>
      <div *ngIf="submitted && f['domainSlug'].errors" class="error-text">Domain slug is required</div>

      <app-modern-input
        label="Username"
        type="text"
        formControlName="username"
        placeholder="Enter your username"
        [required]="true"
      ></app-modern-input>
      <div *ngIf="submitted && f['username'].errors" class="error-text">Username is required</div>

      <app-modern-input
        label="Password"
        type="password"
        formControlName="password"
        placeholder="Enter your password"
        [required]="true"
      ></app-modern-input>
      <div *ngIf="submitted && f['password'].errors" class="error-text">Password is required</div>

      <div *ngIf="error" class="error-alert">{{ error }}</div>

      <div class="form-actions">
        <app-modern-button 
          type="submit" 
          variant="primary" 
          size="lg" 
          [fullWidth]="true"
          [loading]="loading"
        >
          Sign In
        </app-modern-button>
      </div>
    </form>
    
    <div class="helper-links">
      <p class="text-muted">Are you a system owner?</p>
      <a routerLink="/login" class="link-primary">Owner login</a>
    </div>
  </app-modern-card>
</div>
