name: Enterprise CI Pipeline

on:
  push:
    branches: [ main, dev_banuka, 'infra/**', 'feature/**' ]
  pull_request:

jobs:
  sast-scan:
    name: Code Security (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSafes: true
          config: "p/default"

  build-backend:
    name: Build & Scan Backend
    runs-on: ubuntu-latest
    needs: sast-scan
    env:
      SPRING_DATA_MONGODB_URI: ${{ secrets.SPRING_DATA_MONGODB_URI || 'mongodb://localhost:27017/adaptivebp' }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          
      - name: Build & Test Spring Boot
        run: |
          cd Backend/api
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests # tests can be added back if needed or run separately
          
      - name: Build Backend Docker Image
        run: |
          cd Backend/api
          docker build -t adaptivebp-backend:${{ github.sha }} .
          
      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'adaptivebp-backend:${{ github.sha }}'
          format: 'table'
          # Fail pipeline on critical or high vulnerabilities
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  build-frontend:
    name: Build & Scan Frontend
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
          
      - name: Install & Build Angular
        run: |
          cd Frontend
          npm ci
          npm run build -- --configuration=production
          
      - name: Build Frontend Docker Image
        run: |
          cd Frontend
          docker build -t adaptivebp-frontend:${{ github.sha }} .
          
      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'adaptivebp-frontend:${{ github.sha }}'
          format: 'table'
          # Fail pipeline on critical or high vulnerabilities
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
